name: CI/CD — KigaliThreads

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: Lint & validate PHP ──────────────────────────────────────────────
  build:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax (all files)
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

      - name: Verify database schema exists
        run: test -f database/schema.sql && echo "schema.sql found" || exit 1

      - name: Verify required pages exist
        run: |
          for f in index.php products.php product.php cart.php checkout.php checkout-process.php \
                   order-confirmation.php order-tracking.php receipt.php account.php login.php \
                   logout.php admin/products.php admin/orders.php; do
            test -f "$f" && echo "✓ $f" || (echo "✗ MISSING: $f" && exit 1)
          done

  # ── CD: Deploy to InfinityFree via FTP ──────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            README.md
